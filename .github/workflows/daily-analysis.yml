name: Daily Wholesale Market Analysis

on:
  schedule:
    # 매일 오후 2시(KST) = UTC 05:00 (정산 확정 후)
    - cron: '0 5 * * 1-6'  # 월~토 (일요일 휴장)
  workflow_dispatch:  # 수동 실행 가능
    inputs:
      date:
        description: '분석 날짜 (YYYY-MM-DD)'
        required: false

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily analysis
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          fi
          python run_daily.py --date "$DATE"

      - name: Generate DJC management report
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          fi
          python djc_report.py --date "$DATE"

      - name: Send email report
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          fi
          python send_email.py --date "$DATE"

      - name: Send DJC management report email
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          fi
          python djc_report.py --date "$DATE" --email

      - name: Send Telegram report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          fi
          python send_telegram.py --date "$DATE"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git add reports/
          git diff --staged --quiet || git commit -m "도매시장 일일 분석: $DATE"
          git push || echo "Push failed - will retry next run"
