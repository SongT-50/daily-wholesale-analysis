name: Daily Wholesale Market Analysis

on:
  schedule:
    # 매일 오전 8시(KST) = UTC 전날 23:00 (전일 정산 데이터 수집)
    - cron: '0 23 * * 0-5'  # 일~금 UTC = 월~토 KST 오전 8시
  workflow_dispatch:  # 수동 실행 가능
    inputs:
      date:
        description: '분석 날짜 (YYYY-MM-DD)'
        required: false

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily analysis
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            # 오전 8시 실행 → 전날 정산 데이터 수집
            DATE=$(TZ=Asia/Seoul date -d 'yesterday' +%Y-%m-%d)
          fi
          python run_daily.py --date "$DATE"

      - name: Collect shipment reservations
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: |
          TOMORROW=$(TZ=Asia/Seoul date -d 'tomorrow' +%Y-%m-%d)
          echo "출하예약 수집: $TOMORROW"
          python collect_shipment.py --date "$TOMORROW" || echo "출하예약 수집 실패 (API 미승인?)"

      - name: Generate DJC management report
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Seoul date -d 'yesterday' +%Y-%m-%d)
          fi
          python djc_report.py --date "$DATE"

      - name: Send email report
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Seoul date -d 'yesterday' +%Y-%m-%d)
          fi
          python send_email.py --date "$DATE"

      - name: Send DJC management report email
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Seoul date -d 'yesterday' +%Y-%m-%d)
          fi
          python djc_report.py --date "$DATE" --email

      - name: Send Telegram report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Seoul date -d 'yesterday' +%Y-%m-%d)
          fi
          python send_telegram.py --date "$DATE"

      - name: Send DJC Telegram summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Seoul date -d 'yesterday' +%Y-%m-%d)
          fi
          python djc_report.py --date "$DATE" --telegram

      - name: Update dashboard data
        env:
          DASHBOARD_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Seoul date -d 'yesterday' +%Y-%m-%d)
          fi
          if [ -z "$DASHBOARD_TOKEN" ]; then
            echo "DASHBOARD_TOKEN 미설정 — 대시보드 업데이트 건너뜀"
            exit 0
          fi
          git clone https://x-access-token:${DASHBOARD_TOKEN}@github.com/SongT-50/wholesale-dashboard.git /tmp/dashboard
          cd /tmp/dashboard
          # 당일 + 보정 날짜(D-1, D-2) 모두 대시보드 요약 생성
          for D in "$DATE" \
            $(date -d "$DATE - 1 day" +%Y-%m-%d) \
            $(date -d "$DATE - 2 days" +%Y-%m-%d); do
            echo "대시보드 요약 생성: $D"
            AUCTION_DATA_DIR="$GITHUB_WORKSPACE/data" AUCTION_ARCHIVE_DIR="$GITHUB_WORKSPACE/data" python preprocess.py --date "$D" || true
          done
          if git diff --quiet data/; then
            echo "대시보드 데이터 변경 없음"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "대시보드 데이터 업데이트: $DATE (D-1,D-2 보정 포함)"
            git push
            echo "대시보드 데이터 업데이트 완료"
          fi

      - name: Clean old data (keep current month)
        run: |
          cd data/
          # 당월 데이터 유지, 전월 이전 삭제
          CURRENT_MONTH=$(TZ=Asia/Seoul date +%Y-%m)
          echo "당월: $CURRENT_MONTH — 이전 월 데이터 삭제"
          for f in auction_*.json shipment_*.json; do
            [ -f "$f" ] || continue
            # 파일명에서 날짜 추출 (auction_2026-03-20.json → 2026-03)
            FILE_MONTH=$(echo "$f" | grep -oP '\d{4}-\d{2}')
            if [ -n "$FILE_MONTH" ] && [ "$FILE_MONTH" != "$CURRENT_MONTH" ]; then
              echo "  삭제: $f ($FILE_MONTH)"
              rm -f "$f"
            fi
          done
          echo "남은 데이터 파일:"
          ls -la *.json 2>/dev/null || echo "  (없음)"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(TZ=Asia/Seoul date -d 'yesterday' +%Y-%m-%d)
          git add -f data/auction_*.json data/shipment_*.json reports/
          git diff --staged --quiet || git commit -m "도매시장 일일 분석: $DATE"
          git push || echo "Push failed - will retry next run"
