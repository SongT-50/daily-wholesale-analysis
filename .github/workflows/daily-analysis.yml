name: Daily Wholesale Market Analysis

on:
  schedule:
    # 매일 오후 9시(KST) = UTC 12:00 (정산 완전 확정 후)
    - cron: '0 12 * * 1-6'  # 월~토 (일요일 휴장)
  workflow_dispatch:  # 수동 실행 가능
    inputs:
      date:
        description: '분석 날짜 (YYYY-MM-DD)'
        required: false

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily analysis
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          fi
          python run_daily.py --date "$DATE"

      - name: Generate DJC management report
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          fi
          python djc_report.py --date "$DATE"

      - name: Send email report
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          fi
          python send_email.py --date "$DATE"

      - name: Send DJC management report email
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          fi
          python djc_report.py --date "$DATE" --email

      - name: Send Telegram report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          fi
          python send_telegram.py --date "$DATE"

      - name: Update dashboard data
        env:
          DASHBOARD_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          fi
          if [ -z "$DASHBOARD_TOKEN" ]; then
            echo "DASHBOARD_TOKEN 미설정 — 대시보드 업데이트 건너뜀"
            exit 0
          fi
          git clone https://x-access-token:${DASHBOARD_TOKEN}@github.com/SongT-50/wholesale-dashboard.git /tmp/dashboard
          cd /tmp/dashboard
          AUCTION_DATA_DIR="$GITHUB_WORKSPACE/data" python preprocess.py --date "$DATE"
          if git diff --quiet data/; then
            echo "대시보드 데이터 변경 없음"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "대시보드 데이터 업데이트: $DATE"
            git push
            echo "대시보드 데이터 업데이트 완료"
          fi

      - name: Clean old data (keep 7 days)
        run: |
          cd data/
          # 7일 이전 파일 삭제
          find . -name "auction_*.json" -mtime +7 -delete 2>/dev/null || true
          find . -name "shipment_*.json" -mtime +7 -delete 2>/dev/null || true
          echo "남은 데이터 파일:"
          ls -la *.json 2>/dev/null || echo "  (없음)"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git add -f data/auction_*.json data/shipment_*.json reports/
          git diff --staged --quiet || git commit -m "도매시장 일일 분석: $DATE"
          git push || echo "Push failed - will retry next run"
